<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GDPR Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1f3c88,#4facfe);
color:white;
margin:0;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.25);
}

nav ul{display:flex;gap:30px;list-style:none;}

.container{
max-width:900px;
margin:auto;
padding:40px;
text-align:center;
}

button{
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

.correct{background:#4CAF50;}
.wrong{background:#f44336;}
</style>
</head>

<body>

<nav>
<h3>GDPR Project</h3>
<ul>
<li onclick="location.href='index.html'">Home</li>
<li onclick="location.href='dashboard.html'">Dashboard</li>
<li onclick="location.href='quiz.html'">Quiz</li>
</ul>
</nav>

<div class="container">

<h1>GDPR Quiz</h1>

<select id="difficulty" onchange="startQuiz()">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<div id="quiz"></div>

<button id="nextBtn" style="display:none;">Next</button>

<p id="score"></p>

<button onclick="downloadPDF()">Download Report</button>
<button onclick="sendEmail()">Email Result</button>
<button onclick="deleteData()">Delete Data</button>

</div>

<!-- COOKIE BANNER -->
<div id="consentBanner" style="position:fixed;bottom:0;width:100%;background:#000;padding:15px;display:none;text-align:center;">
<p>This site uses cookies to store quiz data.</p>
<button onclick="giveConsent()">Accept</button>
<button onclick="declineConsent()">Decline</button>
</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

//  COOKIE 
function checkConsent(){
let consent = localStorage.getItem("gdprConsent");
if(consent !== "true"){
document.getElementById("consentBanner").style.display="block";
}
}

function giveConsent(){
localStorage.setItem("gdprConsent","true");
document.getElementById("consentBanner").style.display="none";
}

function declineConsent(){
localStorage.setItem("gdprConsent","false");
alert("You declined cookies.");
}

//  QUESTIONS (ALL Have 4 OPTIONS) 
let questions=[

// EASY
{q:"What does GDPR Article 5 focus on?",a:["Data principles","Passwords","Cookies","Encryption"],c:0,level:"easy"},
{q:"What is consent?",a:["Forced","Clear permission","Hidden","Optional"],c:1,level:"easy"},
{q:"What is data minimisation?",a:["Collect all data","Collect only necessary data","Delete everything","Share data"],c:1,level:"easy"},
{q:"Can users withdraw consent?",a:["No","Yes anytime","Only once","Never"],c:1,level:"easy"},
{q:"GDPR stands for?",a:["General Data Protection Regulation","Global Data Rules","Data Protection Act","Privacy Rules"],c:0,level:"easy"},

// MEDIUM
{q:"Purpose limitation means?",a:["Use freely","Use for stated purpose","Sell data","Ignore rules"],c:1,level:"medium"},
{q:"Storage limitation means?",a:["Keep forever","Keep only as needed","Delete instantly","Share data"],c:1,level:"medium"},
{q:"Consent must be?",a:["Hidden","Clear and explicit","Forced","Assumed"],c:1,level:"medium"},
{q:"Accuracy principle?",a:["Correct data","Random data","Old data","Shared data"],c:0,level:"medium"},
{q:"Transparency means?",a:["Hidden","Clear information","Encrypted","Stored"],c:1,level:"medium"},

// HARD
{q:"Accountability requires?",a:["Ignore rules","Show compliance","Delete data","Sell data"],c:1,level:"hard"},
{q:"Lawfulness means?",a:["Breaking rules","Following legal basis","Ignoring consent","Selling data"],c:1,level:"hard"},
{q:"Confidentiality refers to?",a:["Sharing data","Securing data","Deleting data","Public access"],c:1,level:"hard"},
{q:"Data breach is?",a:["Safe storage","Data leak","Encryption","Backup"],c:1,level:"hard"},
{q:"User rights include?",a:["No rights","Control over data","Selling data","Deleting systems"],c:1,level:"hard"}

];

let filtered=[],current=0,score=0,wrongAnswers=[];

window.onload=function(){
checkConsent();
startQuiz();
};

function startQuiz(){
let level=document.getElementById("difficulty").value;
filtered=questions.filter(q=>q.level===level);
current=0;
score=0;
wrongAnswers=[];
showQuestion();
}

function showQuestion(){
let q=filtered[current];
document.getElementById("quiz").innerHTML =
"<p>"+q.q+"</p>"+
q.a.map((ans,i)=>`<button onclick="answer(${i})">${ans}</button>`).join("");
}

function answer(i){
let q=filtered[current];
let buttons=document.querySelectorAll("#quiz button");

buttons.forEach(b=>b.disabled=true);

if(i===q.c){
buttons[i].classList.add("correct");
score++;
}else{
buttons[i].classList.add("wrong");
buttons[q.c].classList.add("correct");

wrongAnswers.push({
question:q.q,
correct:q.a[q.c]
});
}

document.getElementById("nextBtn").style.display="block";
}

document.getElementById("nextBtn").onclick=function(){
current++;
current<filtered.length?showQuestion():endQuiz();
};

function endQuiz(){
document.getElementById("quiz").innerHTML="<h2>Finished</h2>";
document.getElementById("score").innerText="Score: "+score+"/"+filtered.length;

// SAVE DATA
let results = JSON.parse(localStorage.getItem("quizResults")) || [];
results.push({
score:score,
total:filtered.length,
level:document.getElementById("difficulty").value
});
localStorage.setItem("quizResults",JSON.stringify(results));
}

//  PDF (FIXED + WORKING) 
function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF({orientation:"landscape"});

//  BACKGROUND 
doc.setFillColor(31,60,136);
doc.rect(0,0,297,210,"F");

//  WHITE PANEL 
doc.setFillColor(255,255,255);
doc.rect(10,20,277,170,"F");

doc.setTextColor(0,0,0);

//  TITLE + SCORE 
doc.setFontSize(16);
doc.text("GDPR Report",20,30);

let scoreText = document.getElementById("score").innerText || "Score: 0/5";
doc.setFontSize(12);
doc.text(scoreText,20,40);

//  WRONG ANSWERS 
let y = 55;
doc.text("Incorrect Answers:",20,y);
y += 10;

if(wrongAnswers.length === 0){
doc.text("None - Great job!",20,y);
}else{
wrongAnswers.forEach(w=>{
doc.text(w.question,20,y);
y+=5;
doc.text("Correct: "+w.correct,25,y);
y+=10;
});
}

//  LOAD DATA 
let results = JSON.parse(localStorage.getItem("quizResults")) || [];

let easy=[], medium=[], hard=[];
results.forEach(r=>{
if(r.level==="easy") easy.push(r.score);
if(r.level==="medium") medium.push(r.score);
if(r.level==="hard") hard.push(r.score);
});

// GRAPH FUNCTION 
function drawGraph(doc, data, x, y, title, color){

const width = 60;
const height = 40;

// TITLE ABOVE
doc.text(title, x + 20, y - 10);

// AXES
doc.line(x, y, x, y - height);
doc.line(x, y, x + width, y);

// GRID
doc.setDrawColor(220,220,220);
for(let i=0;i<=5;i++){
let yy = y - (i*(height/5));
doc.line(x, yy, x+width, yy);
}

// LABELS Y
doc.setTextColor(0,0,0);
for(let i=0;i<=5;i++){
doc.text(""+i, x-6, y-(i*(height/5)));
}

// LABELS X
for(let i=0;i<data.length;i++){
let xx = x + (i*10);
if(xx <= x+width){
doc.text("A"+(i+1), xx-3, y+6);
}
}

// LINE
doc.setDrawColor(...color);
for(let i=0;i<data.length-1;i++){
doc.line(
x+(i*10),
y-(data[i]*8),
x+((i+1)*10),
y-(data[i+1]*8)
);
}
}

//  DRAW GRAPHS (FIXED POSITIONS) 

// Easy 
drawGraph(doc, easy, 130, 85, "Easy", [0,102,255]);

// Hard 
drawGraph(doc, hard, 200, 85, "Hard", [0,153,76]);

// Medium
drawGraph(doc, medium, 165, 150, "Medium", [255,140,0]);

// LEGEND 
doc.text("Legend:",230,140);

doc.setDrawColor(0,102,255);
doc.line(230,145,240,145);
doc.text("Easy",245,147);

doc.setDrawColor(255,140,0);
doc.line(230,155,240,155);
doc.text("Medium",245,157);

doc.setDrawColor(0,153,76);
doc.line(230,165,240,165);
doc.text("Hard",245,167);

// SAVE 
doc.save("GDPR_Report.pdf");
}

// BACKGROUND
doc.setFillColor(31,60,136);
doc.rect(0,0,297,210,"F");

// PANEL
doc.setFillColor(255,255,255);
doc.rect(10,20,277,170,"F");

doc.setTextColor(0,0,0);

// TITLE
doc.text("GDPR Report",20,30);
doc.text(document.getElementById("score").innerText,20,40);

// WRONG ANSWERS
let y=55;
doc.text("Incorrect Answers:",20,y);
y+=10;

if(wrongAnswers.length===0){
doc.text("None - Great job!",20,y);
}else{
wrongAnswers.forEach(w=>{
doc.text(w.question,20,y);
y+=5;
doc.text("Correct: "+w.correct,25,y);
y+=10;
});
}

// SAVE
doc.save("GDPR_Report.pdf");


// EMAIL
function sendEmail(){
let text=document.getElementById("score").innerText;
window.location.href="mailto:?subject=Quiz Result&body="+encodeURIComponent(text);
}

// DELETE
function deleteData(){
localStorage.removeItem("quizResults");
alert("Data deleted");
location.reload();
}

</script>

</body>
</html>
